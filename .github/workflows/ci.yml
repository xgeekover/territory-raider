name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs electron's postinstall → downloads the Electron binary.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck (renderer + electron)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (renderer + main/preload)
        run: npm run build:desktop

      # Boot smoke: launch Electron, confirm the renderer loads, self-exit 0.
      # Linux needs a virtual display (xvfb) and the SUID sandbox helper.
      - name: Boot smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo chown root:root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox
          xvfb-run --auto-servernum npm run start:desktop
        env:
          SMOKE_TEST: '1'

      - name: Boot smoke test (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run start:desktop
        env:
          SMOKE_TEST: '1'
