name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: # allow manual builds without a tag

permissions:
  contents: write # create/update the GitHub Release and upload assets

jobs:
  build:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dist: npm run dist:mac
            artifacts: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            dist: npm run dist:win
            artifacts: |
              release/*.exe
          - os: ubuntu-latest
            dist: npm run dist:linux
            artifacts: |
              release/*.AppImage
              release/*.deb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Quality gate before we cut installers.
      - name: Verify (typecheck · lint · test)
        run: |
          npm run typecheck
          npm run lint
          npm test

      # Packaging must never publish from a build job (the dist scripts pass
      # --publish never); the single `release` job below owns the GitHub Release.
      - name: Package installers
        run: ${{ matrix.dist }}
        env:
          # Unsigned artifacts — signing/notarization is a later, secret-gated step.
          # Wire real certs here when available:
          #   macOS:   CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          #   Windows: CSC_LINK, CSC_KEY_PASSWORD
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifacts (CI retention)
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  # One job attaches everything to ONE draft release — per-OS jobs racing
  # softprops each created their own duplicate draft.
  release:
    name: draft GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          merge-multiple: true
          path: installers

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**
          draft: true # review before publishing (unsigned builds)
          generate_release_notes: true
